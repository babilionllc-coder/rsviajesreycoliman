name: Auto-Index to Google & Bing on Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'
      - 'blog/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Index mode: changed (default) or all'
        required: false
        default: 'changed'

jobs:
  index-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install googleapis xml2js

      - name: Write Google Service Account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/google-sa-key.json

      - name: Submit changed URLs to Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: /tmp/google-sa-key.json
          INDEX_MODE: ${{ github.event.inputs.mode || 'changed' }}
        run: node .agents/scripts/force_index.js

      - name: Submit to IndexNow (Bing/Yandex)
        run: |
          KEY=$(cat indexnow-key.txt 2>/dev/null || echo "")
          if [ -z "$KEY" ]; then
            echo "⚠️ No IndexNow key found, skipping Bing/Yandex"
            exit 0
          fi

          # Get changed HTML URLs — try git diff first, fall back to lastmod
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          URLS=""

          if [ -n "$CHANGED_FILES" ]; then
            for f in $CHANGED_FILES; do
              if [[ "$f" == "sitemap.xml" ]]; then
                TODAY=$(date +%Y-%m-%d)
                DATES="$TODAY"
                # Also get the most recent lastmod if today has none
                LATEST=$(grep -oP '(?<=<lastmod>)[^<]+' sitemap.xml | sort -r | head -1)
                DATES="$DATES $LATEST"
                for D in $DATES; do
                  NEW_URLS=$(grep -B1 "$D" sitemap.xml | grep -oP '(?<=<loc>)[^<]+' || true)
                  URLS="$URLS $NEW_URLS"
                done
              elif [[ "$f" == *.html ]]; then
                URL_PATH=$(echo "$f" | sed 's|/index\.html$||; s|\.html$||')
                URLS="$URLS https://rsviajesreycoliman.com/$URL_PATH"
              fi
            done
          else
            # Fallback: submit URLs with most recent lastmod
            LATEST=$(grep -oP '(?<=<lastmod>)[^<]+' sitemap.xml | sort -r | head -1)
            URLS=$(grep -B1 "$LATEST" sitemap.xml | grep -oP '(?<=<loc>)[^<]+' || true)
          fi

          # Deduplicate
          URLS=$(echo "$URLS" | tr ' ' '\n' | sort -u | grep -v '^$')
          COUNT=$(echo "$URLS" | wc -l)

          if [ "$COUNT" -eq 0 ] || [ -z "$URLS" ]; then
            echo "ℹ️ No URLs to submit to IndexNow"
            exit 0
          fi

          echo "📤 Submitting $COUNT URLs to IndexNow"
          echo "$URLS"

          URL_ARRAY=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"rsviajesreycoliman.com\",
              \"key\": \"$KEY\",
              \"keyLocation\": \"https://rsviajesreycoliman.com/$KEY.txt\",
              \"urlList\": $URL_ARRAY
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ IndexNow accepted ($HTTP_CODE)"
          else
            echo "⚠️ IndexNow returned $HTTP_CODE: $BODY"
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/google-sa-key.json
