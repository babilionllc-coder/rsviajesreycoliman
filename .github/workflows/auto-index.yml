name: Auto-Index to Google & Bing on Deploy

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'
      - 'blog/**'
  # Daily cron at 03:00 UTC (≈ 21:00 Colima) — drains the quota budget every day
  # so the state-based rotating queue clears the backlog automatically.
  schedule:
    - cron: '0 3 * * *'
  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

# Prevent overlapping runs from wasting quota
concurrency:
  group: auto-index
  cancel-in-progress: false

jobs:
  index-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit updated indexing-state.json back
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install googleapis xml2js

      - name: Write Google Service Account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/google-sa-key.json

      - name: Submit URLs to Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: /tmp/google-sa-key.json
        run: node .agents/scripts/force_index.js

      - name: Commit updated indexing state
        run: |
          if [ -n "$(git status --porcelain .agents/indexing-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .agents/indexing-state.json
            git commit -m "chore(index): update indexing state [skip ci]"
            git push
            echo "💾 Indexing state committed"
          else
            echo "ℹ️ No state changes to commit"
          fi

      - name: Submit sitemap to IndexNow (Bing/Yandex)
        run: |
          # Extract URLs from sitemap
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml)
          KEY=$(cat indexnow-key.txt 2>/dev/null || echo "")

          if [ -z "$KEY" ]; then
            echo "⚠️ No IndexNow key found, skipping Bing/Yandex submission"
            exit 0
          fi

          # Submit batch to IndexNow API
          URL_ARRAY=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"rsviajesreycoliman.com\",
              \"key\": \"$KEY\",
              \"keyLocation\": \"https://rsviajesreycoliman.com/$KEY.txt\",
              \"urlList\": $URL_ARRAY
            }" && echo "✅ IndexNow submission complete" || echo "⚠️ IndexNow submission failed"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/google-sa-key.json
