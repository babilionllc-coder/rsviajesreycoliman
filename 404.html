<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PQEBBLW9GB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PQEBBLW9GB');
    </script>
    <title>Página no encontrada — RS Viajes Rey Colimán</title>
    <meta name="description" content="La página que buscas no existe. Regresa al inicio de RS Viajes Rey Colimán para explorar nuestros tours y destinos.">
    <meta name="robots" content="noindex, nofollow">
    <link href="favicon.ico" type="image/x-icon" rel="icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet" />
    <style>
        :root {
            --navy: #0B1F3F;
            --gold: #C8A54D;
            --soft-gray: #F5F5F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .error-container {
            max-width: 600px;
        }
        .logo {
            margin-bottom: 40px;
        }
        .logo img {
            height: 80px;
            border-radius: 50%;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(200, 165, 77, 0.3);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--gold);
            color: var(--navy);
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(200, 165, 77, 0.3);
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(200, 165, 77, 0.4);
        }
        .social-links {
            margin-top: 48px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .social-links a {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .social-links a:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        @media (max-width: 576px) {
            .error-code { font-size: 5rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="logo">
            <a href="index.html">
                <img src="images/logo-optimized.png" alt="RS Viajes Rey Colimán" height="80">
            </a>
        </div>
        <div class="error-code">404</div>
        <h1 data-i18n="404.title">Página no encontrada</h1>
        <p data-i18n="404.desc">Lo sentimos, la página que buscas no existe o fue movida. Regresa al inicio para explorar nuestros tours nacionales e internacionales.</p>
        <a href="index.html" class="btn-home">
            <i class="fas fa-home"></i> <span data-i18n="404.btn">Volver al inicio</span>
        </a>
        <div class="social-links">
            <a href="https://www.facebook.com/REYCOLIMANAGENCIA/" target="_blank" rel="noopener" aria-label="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://www.instagram.com/rsviajesreycoliman/" target="_blank" rel="noopener" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.tiktok.com/@rey.coliman" target="_blank" rel="noopener" aria-label="TikTok">
                <img src="images/tiktok_icon.svg" alt="TikTok" style="width: 18px; height: 18px; filter: brightness(0) invert(1); opacity: 0.6;">
            </a>
        </div>
    </div>
    <script src="js/i18n.js"></script>
</body>
</html>
