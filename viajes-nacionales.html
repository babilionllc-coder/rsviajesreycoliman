    <script>
    (function() {
      // Safely attach event listener
      var btn = document.getElementById('viaje-cotizar-btn');
      if (btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (window.CotizarModal && window.CotizarModal.open) {
            window.CotizarModal.open('Viajes Nacionales / A la Medida');
          } else {
            console.error('CotizarModal is not available');
            window.open('https://api.whatsapp.com/send/?phone=523125504084&text=' + encodeURIComponent('¡Hola! Me gustaría cotizar un viaje nacional a la medida.'), '_blank');
          }
        });
      }
    })();
    </script>
